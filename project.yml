name: Klen
options:
  bundleIdPrefix: com.simonlang
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    MARKETING_VERSION: "1.5"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    INFOPLIST_KEY_NSHumanReadableDescription: "Minimalist macOS ToDo app with Quick-Capture."
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
  configs:
    Debug:
      PRODUCT_BUNDLE_IDENTIFIER: com.simonlang.Klen.dev
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      APP_DISPLAY_NAME: Klen Dev
    Release:
      PRODUCT_BUNDLE_IDENTIFIER: com.simonlang.Klen
      APP_DISPLAY_NAME: Klen

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.2.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  Klen:
    type: application
    platform: macOS
    sources:
      - path: Plink
        excludes:
          - "**/*.xcstrings"
      - path: Plink/Core/Localizable.xcstrings
        type: file
        buildPhase: resources
    resources:
      - path: Plink/Core/Localizable.xcstrings
    dependencies:
      - package: KeyboardShortcuts
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        INFOPLIST_FILE: Plink/Info.plist
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets: []

schemes:
  Klen:
    build:
      targets:
        Klen: all
    run:
      config: Debug
    archive:
      config: Release
